<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>A Day In My Life</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.css">
</head>

<body>

<audio id="bg-music" autoplay loop muted>
    <source src="audio/music.mp3" type="audio/mpeg">
</audio>

<div id="main">

<!-- BUTTERFLY INTRO -->
<section class="panel intro">
<img id="butterfly" class="scene" src="images/butterfly.png">
<h1>A Day In My Life</h1>
</section>

<section class="panel morning">
<img id="sunrise" class="scene" src="images/sunrise.png">
<h1>Sunrise 🌅</h1>
</section>

<section class="panel morning">
<img id="wakeup" class="scene" src="images/wakeup.jpg">
<h1>I Wake Up At 7 AM</h1>
</section>

<section class="panel morning">
<img id="breakfast" class="scene"  src="images/breakfast.png">
<h1>Breakfast Time</h1>
</section>

<section class="panel day">
<img id="college" class="scene" src="images/college.png">
<h1>College At 8</h1>
</section>

<section class="panel day">
<img id="lunch" class="scene" src="images/lunch.png">
<h1>Lunch Time</h1>
</section>

<section class="panel day scooty-section">
<img id="scooty" class="scene" src="images/scooty.png">
<h1>Ride On My Scooty 🛵</h1>
</section>

<section class="panel evening">
<img id="german" class="scene" src="images/german.png">
<h1>German Class At 5</h1>
</section>

<section class="panel evening">
<img id="sunset" class="scene" src="images/sunset.png">
<h1>Back Home At Sunset</h1>
</section>

<section class="panel night">
<img id="coding" class="scene" src="images/coding.png">
<h1>Coding Time</h1>
</section>

<section class="panel night">
<img id="family" class="scene" src="images/family.png">
<h1>Family Time ❤️</h1>
</section>

<section class="panel night">
<img id="dinner" class="scene" src="images/dinner.png">
<h1>Dinner</h1>
</section>

<section class="panel night">
<img id="sleep" class="scene" src="images/sleep.png">
<h1>Sleep 😴</h1>
</section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.min.js"></script>

<script src="script.js"></script>

</body>
</html>
